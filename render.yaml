services:
  - type: web
    name: next-best-guess-abc-demo
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DEMO_USERNAME
        value: abc
      - key: DEMO_PASSWORD
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5
      - key: OPENAI_FALLBACK_MODEL
        value: gpt-4.1
      - key: OPENAI_REASONING_EFFORT
        value: low
      - key: ANSWER_CACHE_FILE
        value: /var/data/answer_cache.json
    disk:
      name: answer-cache
      mountPath: /var/data
      sizeGB: 1
